name: Release Packages

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run npm pack instead of npm publish
        required: false
        default: true
        type: boolean
      npm_tag:
        description: npm dist-tag to publish under when dry_run is false
        required: false
        default: next
        type: string
      npm_scope:
        description: npm scope to publish under without the leading @
        required: false
        default: le-space
        type: string
      provenance:
        description: Enable npm provenance publishing (requires a public GitHub repository)
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build publishable artifacts
        env:
          NPM_SCOPE: ${{ inputs.npm_scope }}
        run: pnpm publish:prepare

      - name: Pack dist packages
        if: ${{ inputs.dry_run }}
        env:
          NPM_SCOPE: ${{ inputs.npm_scope }}
        run: node ./scripts/publish-from-dist.mjs --dry-run --tag "${{ inputs.npm_tag }}"

      - name: Upload dry-run tarballs
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-tarballs
          path: |
            packages/shared-types/dist/*.tgz
            packages/core/dist/*.tgz
            packages/rootfs/dist/*.tgz
            packages/browser/dist/*.tgz
            packages/ui/dist/*.tgz
            packages/node/dist/*.tgz

      - name: Verify npm token is configured
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "${NODE_AUTH_TOKEN}" ]]; then
            echo "NPM_TOKEN secret is required for publishing." >&2
            exit 1
          fi

      - name: Inspect npm authentication
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm whoami || echo 'npm whoami failed; continuing so npm publish can report the real auth result.' >&2

      - name: Publish dist packages
        if: ${{ !inputs.dry_run }}
        env:
          NPM_SCOPE: ${{ inputs.npm_scope }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          args=(--tag "${{ inputs.npm_tag }}")
          if [[ "${{ inputs.provenance }}" == "true" ]]; then
            args+=(--provenance)
          fi
          node ./scripts/publish-from-dist.mjs "${args[@]}"
